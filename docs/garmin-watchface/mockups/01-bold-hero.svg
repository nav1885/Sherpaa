<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 454 454" width="454" height="454">
  <title>Design 1 — Bold Hero (Ember theme)</title>
  <defs>
    <clipPath id="watch1"><circle cx="227" cy="227" r="227"/></clipPath>
  </defs>
  <g clip-path="url(#watch1)" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
    <rect width="454" height="454" fill="#000000"/>

    <!-- Outer faint track -->
    <circle cx="227" cy="227" r="212" fill="none" stroke="#141414" stroke-width="6"/>
    <!-- Steps progress arc 72% (clockwise from 12 o'clock) -->
    <path d="M 227 15 A 212 212 0 1 1 18.8 266.7" stroke="#FF6B35" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Date strip -->
    <text x="227" y="92" text-anchor="middle" font-size="17" font-weight="500" fill="#9a9a9a" letter-spacing="5">THU · 28 MAY</text>

    <!-- Hero time -->
    <text x="227" y="248" text-anchor="middle" font-size="142" font-weight="800" fill="#FFFFFF" letter-spacing="-5">10:42</text>

    <!-- Primary stat -->
    <text x="227" y="288" text-anchor="middle" font-size="20" font-weight="700" fill="#FF6B35" letter-spacing="4">BODY  78</text>

    <!-- Corner complications -->
    <text x="92" y="172" text-anchor="middle" font-size="11" font-weight="500" fill="#666" letter-spacing="2">HR</text>
    <text x="92" y="198" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">62</text>

    <text x="362" y="172" text-anchor="middle" font-size="11" font-weight="500" fill="#666" letter-spacing="2">STEPS</text>
    <text x="362" y="198" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">7.2K</text>

    <text x="92" y="332" text-anchor="middle" font-size="11" font-weight="500" fill="#666" letter-spacing="2">ALT</text>
    <text x="92" y="358" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">142m</text>

    <text x="362" y="332" text-anchor="middle" font-size="11" font-weight="500" fill="#666" letter-spacing="2">BAT</text>
    <text x="362" y="358" text-anchor="middle" font-size="26" font-weight="700" fill="#fff">84%</text>
  </g>
  <!-- Bezel ring for visual reference -->
  <circle cx="227" cy="227" r="226" fill="none" stroke="#2a2a2a" stroke-width="2"/>
</svg>
