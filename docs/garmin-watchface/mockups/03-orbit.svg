<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 454 454" width="454" height="454">
  <title>Design 3 — Orbit (Aurora theme, 24h sun arc)</title>
  <defs>
    <clipPath id="watch3"><circle cx="227" cy="227" r="227"/></clipPath>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#watch3)" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
    <rect width="454" height="454" fill="#000000"/>

    <!-- 24-hour faint track -->
    <circle cx="227" cy="227" r="210" fill="none" stroke="#0f0f0f" stroke-width="12"/>

    <!-- Daylight arc: sunrise 05:42 (85.5°) → sunset 20:18 (304.5°) -->
    <path d="M 434.4 210.7 A 210 210 0 1 1 55.8 108.9"
          stroke="url(#aurora)" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Tick marks at 6, 12, 18 -->
    <line x1="429" y1="227" x2="441" y2="227" stroke="#333" stroke-width="2"/>
    <line x1="227" y1="429" x2="227" y2="441" stroke="#333" stroke-width="2"/>
    <line x1="13" y1="227" x2="25" y2="227" stroke="#333" stroke-width="2"/>

    <!-- Current time tick on ring (10:42 = 160.5°) -->
    <circle cx="297.1" cy="425.0" r="9" fill="#ffffff" stroke="#000" stroke-width="3"/>

    <!-- Battery top center -->
    <text x="227" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#888" letter-spacing="3">BATTERY 84%</text>

    <!-- Center time -->
    <text x="227" y="218" text-anchor="middle" font-size="102" font-weight="700" fill="#ffffff" letter-spacing="-3">10:42</text>

    <!-- Date below time -->
    <text x="227" y="248" text-anchor="middle" font-size="13" font-weight="500" fill="#7a7a7a" letter-spacing="3">THURSDAY · MAY 28</text>

    <!-- Side stats -->
    <text x="102" y="220" text-anchor="middle" font-size="24" font-weight="700" fill="#A78BFA">62</text>
    <text x="102" y="238" text-anchor="middle" font-size="9" font-weight="500" fill="#555" letter-spacing="2">BPM</text>

    <text x="352" y="220" text-anchor="middle" font-size="24" font-weight="700" fill="#5EEAD4">78</text>
    <text x="352" y="238" text-anchor="middle" font-size="9" font-weight="500" fill="#555" letter-spacing="2">BODY</text>

    <!-- Primary stat: steps + progress bar -->
    <text x="227" y="290" text-anchor="middle" font-size="36" font-weight="800" fill="#ffffff">7,243</text>
    <text x="227" y="308" text-anchor="middle" font-size="10" font-weight="500" fill="#555" letter-spacing="3">STEPS · GOAL 10K</text>

    <rect x="167" y="318" width="120" height="3" fill="#1a1a1a" rx="1.5"/>
    <rect x="167" y="318" width="87" height="3" fill="url(#aurora)" rx="1.5"/>

    <!-- Sunrise / sunset labels -->
    <text x="227" y="370" text-anchor="middle" font-size="10" font-weight="500" fill="#666" letter-spacing="2">SUNRISE 05:42   ·   SUNSET 20:18</text>
  </g>
  <circle cx="227" cy="227" r="226" fill="none" stroke="#2a2a2a" stroke-width="2"/>
</svg>
